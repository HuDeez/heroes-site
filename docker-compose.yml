services:
  backend:
    image: app_backend
    build:
      context: ./backend
    depends_on:
      database:
        condition: service_healthy
    ports:
      - '8000:8000'
    networks:
      - net

  # frontend:
  #   image: app_frontend
  #   build:
  #     context: ./frontend
  #   ports:
  #     - '80:80'
  #   environment:
  #     BACKEND_HOST: backend
  #     BACKEND_PORT: 8080
  #   depends_on:
  #     - backend
  #   networks:
  #     - net
      
  database:
    image: postgres:17.0
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT}:5432'
    networks:
      - net

volumes:
  db-data:

networks:
  net:
    driver: bridge